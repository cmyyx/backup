name: 同步外部仓库到特定分支

on:
  schedule:
    # 每天凌晨3点执行一次 (UTC时间)
    - cron: '0 3 * * *'
  workflow_dispatch: # 允许从 GitHub Actions 界面手动触发

jobs:
  # 任务1: 同步到 'rule' 分支
  sync_to_rule_branch:
    name: 同步 Keywos/rule 到 'rule' 分支
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    env:
      TARGET_BRANCH_NAME: "rule"
      SOURCE_REPO_URL: "https://github.com/Keywos/rule.git"
      SOURCE_REPO_BRANCH: "main"
      # --- 私有仓库配置 (已注释) ---
      # 如果 Keywos/rule 是私有仓库，请在仓库的 Settings -> Secrets -> Actions 中添加名为 SOURCE_REPO_URL_WITH_PAT 的密钥
      # 其值为 https://<your_pat>@github.com/Keywos/rule.git
      # 然后取消下面这行的注释。
      # SOURCE_REPO_URL_WITH_PAT: ${{ secrets.SOURCE_REPO_URL_WITH_PAT }}
      
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name 'GitHub Actions 同步机器人'
          git config --global user.email 'actions-sync@users.noreply.github.com'

      - name: 检查并创建目标分支 (如果不存在)
        run: |
          set -e
          BRANCH_NAME="${{ env.TARGET_BRANCH_NAME }}"
          if git rev-parse --verify "origin/$BRANCH_NAME" >/dev/null 2>&1; then
            echo "分支 '$BRANCH_NAME' 已存在，正在检出..."
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"
          else
            echo "分支 '$BRANCH_NAME' 不存在，正在创建新的孤立分支..."
            git checkout --orphan "$BRANCH_NAME"
            git rm -rf .
            git commit --allow-empty -m "feat: Initialize new orphan branch $BRANCH_NAME"
            git push -u origin "$BRANCH_NAME"
          fi
          echo "当前分支已设置为 '$BRANCH_NAME'."

      - name: 从 Keywos/rule 同步内容
        run: |
          set -e
          # --- URL 选择逻辑 (私有仓库部分已注释) ---
          # 如果是私有仓库，请取消下面一行的注释，并注释掉 `git remote add` 命令中的公开 URL
          # FINAL_SOURCE_URL=${SOURCE_REPO_URL_WITH_PAT:-${{ env.SOURCE_REPO_URL }}}
          
          echo "添加源仓库 (Keywos/rule) 的远程地址..."
          # 当前使用公开仓库 URL
          git remote add source_repo "${{ env.SOURCE_REPO_URL }}"
          # 如果是私有仓库，请注释掉上面一行，并取消下面一行的注释
          # git remote add source_repo "$FINAL_SOURCE_URL"
          
          echo "从源仓库的 '${{ env.SOURCE_REPO_BRANCH }}' 分支拉取最新提交..."
          git fetch source_repo "${{ env.SOURCE_REPO_BRANCH }}" --no-tags --prune
          
          echo "尝试将 source_repo/${{ env.SOURCE_REPO_BRANCH }} 合并到本地分支..."
          MERGE_COMMIT_MSG="Merge: 同步来自 Keywos/rule (${{ env.SOURCE_REPO_BRANCH }}) 的更新"
          
          if git merge "source_repo/${{ env.SOURCE_REPO_BRANCH }}" --no-ff --no-edit -m "$MERGE_COMMIT_MSG" --allow-unrelated-histories; then
            echo "合并成功，正在推送更改到 origin/${{ env.TARGET_BRANCH_NAME }}..."
            git push origin "${{ env.TARGET_BRANCH_NAME }}"
          else
            echo "合并失败！可能存在冲突。请检查下面的状态输出以进行手动排查。"
            git status
            exit 1
          fi
          
          echo "移除源仓库 (Keywos/rule) 的远程地址..."
          git remote remove source_repo

  # 任务2: 同步到 'override-rules' 分支并处理工作流文件
  sync_to_override_rules_branch:
    name: 同步 powerfullz/override-rules 并存档工作流
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      workflows: write
      
    env:
      TARGET_BRANCH_NAME: "override-rules"
      SOURCE_REPO_URL: "https://github.com/powerfullz/override-rules.git"
      SOURCE_REPO_BRANCH: "main"
      # --- 私有仓库配置 (已注释) ---
      # 如果 powerfullz/override-rules 是私有仓库，请在仓库的 Settings -> Secrets -> Actions 中添加名为 SOURCE_REPO_URL_WITH_PAT 的密钥
      # 其值为 https://<your_pat>@github.com/powerfullz/override-rules.git
      # 然后取消下面这行的注释。
      # SOURCE_REPO_URL_WITH_PAT: ${{ secrets.SOURCE_REPO_URL_WITH_PAT }}
      
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name 'GitHub Actions 同步机器人'
          git config --global user.email 'actions-sync@users.noreply.github.com'

      - name: 检查并创建目标分支 (如果不存在)
        run: |
          set -e
          BRANCH_NAME="${{ env.TARGET_BRANCH_NAME }}"
          if git rev-parse --verify "origin/$BRANCH_NAME" >/dev/null 2>&1; then
            echo "分支 '$BRANCH_NAME' 已存在，正在检出..."
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"
          else
            echo "分支 '$BRANCH_NAME' 不存在，正在创建新的孤立分支..."
            git checkout --orphan "$BRANCH_NAME"
            git rm -rf .
            git commit --allow-empty -m "feat: Initialize new orphan branch $BRANCH_NAME"
            git push -u origin "$BRANCH_NAME"
          fi
          echo "当前分支已设置为 '$BRANCH_NAME'."

      - name: 从 powerfullz/override-rules 同步并存档工作流
        run: |
          set -e
          # --- URL 选择逻辑 (私有仓库部分已注释) ---
          # 如果是私有仓库，请取消下面一行的注释，并注释掉 `git remote add` 命令中的公开 URL
          # FINAL_SOURCE_URL=${SOURCE_REPO_URL_WITH_PAT:-${{ env.SOURCE_REPO_URL }}}

          echo "添加源仓库 (powerfullz/override-rules) 的远程地址..."
          # 当前使用公开仓库 URL
          git remote add source_repo "${{ env.SOURCE_REPO_URL }}"
          # 如果是私有仓库，请注释掉上面一行，并取消下面一行的注释
          # git remote add source_repo "$FINAL_SOURCE_URL"
          
          echo "从源仓库的 '${{ env.SOURCE_REPO_BRANCH }}' 分支拉取最新提交..."
          git fetch source_repo "${{ env.SOURCE_REPO_BRANCH }}" --no-tags --prune
          
          echo "尝试将 source_repo/${{ env.SOURCE_REPO_BRANCH }} 合并到本地分支..."
          MERGE_COMMIT_MSG="Merge: 同步来自 powerfullz/override-rules (${{ env.SOURCE_REPO_BRANCH }}) 的更新"
          
          if git merge "source_repo/${{ env.SOURCE_REPO_BRANCH }}" --no-ff --no-edit -m "$MERGE_COMMIT_MSG" --allow-unrelated-histories; then
            echo "合并成功。"

            UPSTREAM_WF_DIR=".github/workflows"
            ARCHIVE_WF_DIR="archived_workflows"

            if [ -d "$UPSTREAM_WF_DIR" ] && [ "$(ls -A $UPSTREAM_WF_DIR)" ]; then
              echo "发现上游工作流文件，正在将它们移动到 '$ARCHIVE_WF_DIR' 目录以禁用它们..."
              mkdir -p "$ARCHIVE_WF_DIR"
              
              files_moved=false
              for filepath in "$UPSTREAM_WF_DIR"/*; do
                if [ -f "$filepath" ]; then
                  filename=$(basename "$filepath")
                  new_path="$ARCHIVE_WF_DIR/$filename.txt"
                  echo "存档: $filepath -> $new_path"
                  git mv "$filepath" "$new_path"
                  files_moved=true
                fi
              done

              if [ "$files_moved" = true ]; then
                echo "修正合并提交，将文件移动操作包含进去..."
                git commit --amend --no-edit
                echo "提交已修正。"
              fi
            else
              echo "未发现上游工作流目录，无需处理。"
            fi
            
            echo "推送最终更改到 origin/${{ env.TARGET_BRANCH_NAME }}..."
            git push origin "${{ env.TARGET_BRANCH_NAME }}"
          else
            echo "合并失败！可能存在冲突。请检查下面的状态输出以进行手动排查。"
            git status
            exit 1
          fi
          
          echo "移除源仓库 (powerfullz/override-rules) 的远程地址..."
          git remote remove source_repo
